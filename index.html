<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Турнирная Таблица ZZZ</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            --gold: #ffcc00;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
            --bg-card: #1a1a1a;
            --tier-newbie-bg: #1e2d35; --tier-newbie-text: #5eb5e0;
            --tier-mid-bg: #2d2a1e;    --tier-mid-text: #e0ca5e;
            --tier-high-bg: #351e1e;   --tier-high-text: #e05e5e;
            --promo-dot: #2eb82e;
            --gain: #2eb82e;
            --loss: #ff4444;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 25px; width: 100%; max-width: 1400px; }
        .layout.no-admin { grid-template-columns: 1fr; }
        
        .card { background: var(--bg-card); padding: 25px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.7); height: fit-content; }
        h2 { color: var(--gold); text-transform: uppercase; font-size: 1.1em; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; margin-top: 0; }

        .table-wrapper { max-height: 650px; overflow-y: auto; border-radius: 8px; }
        .table-wrapper::-webkit-scrollbar { width: 6px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* СТИЛЬ ПОИСКА */
        .search-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; margin-bottom: 20px; padding-bottom: 10px; }
        .search-container h2 { border: none; margin: 0; padding: 0; }
        .search-input { background: #252525; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 6px; width: 200px; font-size: 0.85em; outline: none; }
        .search-input:focus { border-color: var(--gold); }

        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #252525; padding: 15px; color: #888; font-size: 0.8em; text-align: left; z-index: 10; }
        td { padding: 16px 15px; border-bottom: 1px solid #252525; }

        .top-1 { background: rgba(255, 204, 0, 0.08) !important; border-left: 4px solid var(--gold); }
        .top-1 .player-name { color: var(--gold); text-shadow: 0 0 15px rgba(255, 204, 0, 0.6); font-weight: bold; }
        .top-2 { background: rgba(224, 224, 224, 0.05) !important; border-left: 4px solid var(--silver); }
        .top-2 .player-name { color: var(--silver); text-shadow: 0 0 12px rgba(224, 224, 224, 0.4); font-weight: bold; }
        .top-3 { background: rgba(205, 127, 50, 0.05) !important; border-left: 4px solid var(--bronze); }
        .top-3 .player-name { color: var(--bronze); text-shadow: 0 0 12px rgba(205, 127, 50, 0.4); font-weight: bold; }

        .tier-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.7em; font-weight: bold; }
        .t-newbie { background: var(--tier-newbie-bg); color: var(--tier-newbie-text); }
        .t-mid { background: var(--tier-mid-bg); color: var(--tier-mid-text); }
        .t-high { background: var(--tier-high-bg); color: var(--tier-high-text); }

        .forecast-box { background: #000; padding: 15px; border-radius: 8px; border: 1px dashed #444; margin: 15px 0; display: none; line-height: 1.6; }
        .forecast-name { font-weight: bold; color: #fff; }
        .slash { color: #555; margin: 0 3px; }
        .gain { color: var(--gain); font-weight: bold; }
        .loss { color: var(--loss); font-weight: bold; }

        input, select { background: #252525; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        
        .btn-forecast { background: var(--gold) !important; color: #000 !important; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2); }
        .btn-forecast:hover { background: #ffdb4d !important; transform: translateY(-1px); }

        button { background: #333; color: #fff; border: 1px solid #444; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 5px; }
        button:hover { background: #444; }
        .btn-play { background: var(--gold); color: #000; border: none; }

        .lvl-badge { padding: 3px 7px; background: #333; color: var(--gold); border-radius: 4px; font-size: 0.75em; font-weight: bold; }
        .admin-only { display: none; }
        .promo-wrap { display: inline-flex; gap: 4px; margin-left: 10px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #333; border: 1px solid #444; }
        .dot.active { background: var(--promo-dot); box-shadow: 0 0 5px var(--promo-dot); }
    </style>
</head>
<body>

<div class="layout no-admin" id="mainLayout">
    <div class="card admin-only">
        <h2>Control Panel</h2>
        <input type="text" id="playerName" placeholder="Имя игрока">
        <button onclick="addPlayer()">Добавить игрока</button>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        
        <select id="p1Select"></select>
        <select id="p2Select"></select>
        
        <button class="btn-forecast" onclick="showForecast()">📈 Прогноз ELO</button>
        <div class="forecast-box" id="forecast"></div>

        <select id="matchResult">
            <option value="1">Победа Игрока 1</option>
            <option value="0">Победа Игрока 2</option>
        </select>
        <button class="btn-play" onclick="playMatch()">⚔️ Записать матч</button>
        <button onclick="finalizeTournament()" style="background:#2eb82e; color:white; border:none; margin-top:10px;">✅ Применить итоги</button>
        <button onclick="logout()" style="background:none; color:#555; border:none; margin-top:20px;">Выйти</button>
    </div>

    <div class="card">
        <div class="search-container">
            <h2>Турнирная Таблица ZZZ</h2>
            <input type="text" id="playerSearch" class="search-input" placeholder="Поиск игрока..." onkeyup="filterTable()">
        </div>
        <div class="table-wrapper">
            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>№</th>
                        <th>Тир</th>
                        <th>Игрок</th>
                        <th>ELO</th>
                        <th>LVL</th>
                        <th class="admin-only">Опции</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div style="margin-top:25px; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="color:#555; font-size:0.8em; margin:0; letter-spacing:1px;">ИСТОРИЯ МАТЧЕЙ</h3>
            <button class="admin-only" onclick="clearHistory()" style="width:auto; padding:5px 10px; font-size:0.7em; background:#441111; color:#ff4444; border-color:#662222; margin:0;">ОЧИСТИТЬ</button>
        </div>
        <div id="logItems" style="margin-top:10px;"></div>
    </div>
</div>

<button id="loginBtn" onclick="login()" style="background:transparent; color:#333; width:auto; border:1px solid #222; margin-top:40px;">Admin</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAlcnUiLJ1cq7ekCQFi_NOPAQ6UiG92ZqM",
        databaseURL: "https://zzz-league-default-rtdb.firebaseio.com",
        projectId: "zzz-league"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    
    let isAdmin = false;
    let players = [];
    let lastPlayerCount = 0;

    auth.onAuthStateChanged(user => {
        isAdmin = !!user;
        document.getElementById('mainLayout').className = isAdmin ? 'layout' : 'layout no-admin';
        updateUI();
    });

    db.ref('players').on('value', snap => {
        const data = snap.val();
        players = data ? Object.values(data) : [];
        updateUI();
    });

    db.ref('history').limitToLast(5).on('value', snap => {
        const data = snap.val();
        if (!data) { document.getElementById('logItems').innerHTML = ""; return; }
        document.getElementById('logItems').innerHTML = Object.values(data).reverse().map(m => `
            <div style="font-size:0.85em; padding:8px 0; border-bottom:1px solid #222; color:#999;">
                <b>${m.p1}</b> vs <b>${m.p2}</b>: <span class="${m.change >= 0 ? 'gain' : 'loss'}">${m.change >= 0 ? '+' : ''}${m.change} ELO</span>
            </div>
        `).join('');
    });

    // ФУНКЦИЯ ПОИСКА
    function filterTable() {
        const query = document.getElementById('playerSearch').value.toLowerCase();
        const rows = document.querySelectorAll('#leaderboard tbody tr');
        rows.forEach(row => {
            const name = row.querySelector('.player-name').textContent.toLowerCase();
            row.style.display = name.includes(query) ? "" : "none";
        });
    }

    function calculateEloChange(pA, pB, outcome) {
        const k = pA.elo >= 1200 ? 20 : 50;
        const expected = 1 / (1 + Math.pow(10, (pB.elo - pA.elo) / 400));
        return Math.round(k * (outcome - expected)) || (outcome === 1 ? 1 : -1);
    }

    function showForecast() {
        const p1 = players.find(p => p.name === document.getElementById('p1Select').value);
        const p2 = players.find(p => p.name === document.getElementById('p2Select').value);
        if (!p1 || !p2 || p1.name === p2.name) return alert("Выберите разных игроков");
        const win1 = calculateEloChange(p1, p2, 1);
        const loss1 = calculateEloChange(p1, p2, 0);
        const fBox = document.getElementById('forecast');
        fBox.style.display = 'block';
        fBox.innerHTML = `<div><span class="forecast-name">${p1.name}:</span> <span class="gain">+${win1}</span><span class="slash">/</span><span class="loss">${loss1}</span> ELO</div>`;
    }

    function updateUI() {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
        const thAdmin = document.querySelector('th.admin-only');
        if(thAdmin) thAdmin.style.display = isAdmin ? 'table-cell' : 'none';

        const tbody = document.querySelector('#leaderboard tbody');
        const sorted = [...players].sort((a,b) => b.elo - a.elo);
        tbody.innerHTML = "";
        
        sorted.forEach((p, i) => {
            const elo = p.elo || 1000;
            const streak = p.promoStreak || 0;
            const isMid = p.isMidConfirmed || false;
            const isHigh = p.isHighConfirmed || false;
            const rank = i + 1;
            
            let tClass = "t-newbie", tName = "NEWBIE";
            if (isHigh && elo >= 1350) { 
                tClass = "t-high"; tName = "HIGH TIER"; 
            } else if (isMid && elo >= 1150) { 
                tClass = "t-mid"; tName = "MID TIER"; 
            }

            let promoHtml = "";
            if (elo >= 1200 && elo < 1400 && !isMid) {
                promoHtml = `<div class="promo-wrap"><div class="dot ${streak >= 1 ? 'active' : ''}"></div><div class="dot ${streak >= 2 ? 'active' : ''}"></div><div class="dot ${streak >= 3 ? 'active' : ''}"></div></div>`;
            }

            const curPts = p.tournamentPoints || 0;
            const level = Math.min(10, Math.floor((elo - 1000) / 40) + 1);

            tbody.innerHTML += `
                <tr class="${rank <= 3 ? 'top-'+rank : ''}">
                    <td>${rank}</td>
                    <td><span class="tier-badge ${tClass}">${tName}</span></td>
                    <td class="player-name">${p.name} ${promoHtml}</td>
                    <td><b>${elo}</b> ${curPts !== 0 ? `<small class="${curPts > 0 ? 'gain' : 'loss'}">(${curPts > 0 ? '+' : ''}${curPts})</small>` : ''}</td>
                    <td><span class="lvl-badge">L${level < 1 ? 1 : level}</span></td>
                    ${isAdmin ? `<td style="display: flex; gap: 10px; justify-content: center;">
                        <button onclick="manualElo('${p.name}', ${elo})" style="background:none; border:none; width:auto; padding:0; cursor:pointer; font-size:1.1em;">⚙️</button>
                        <button onclick="deletePlayer('${p.name}')" style="background:none; border:none; width:auto; padding:0; cursor:pointer; color:#ff4444; font-size:1.1em;">✕</button>
                    </td>` : ''}
                </tr>`;
        });

        if (isAdmin && players.length !== lastPlayerCount) {
            const s1 = document.getElementById('p1Select'), s2 = document.getElementById('p2Select');
            const opts = players.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            s1.innerHTML = opts; s2.innerHTML = opts;
            lastPlayerCount = players.length;
        }

        // ПРИМЕНЯЕМ ФИЛЬТР ПОСЛЕ ОБНОВЛЕНИЯ ДАННЫХ
        filterTable();
    }

    function playMatch() {
        const p1 = players.find(p => p.name === document.getElementById('p1Select').value);
        const p2 = players.find(p => p.name === document.getElementById('p2Select').value);
        const res = parseFloat(document.getElementById('matchResult').value);
        if(!p1 || !p2 || p1.name === p2.name) return;

        const c1 = calculateEloChange(p1, p2, res);
        updateMatchData(p1, c1, res === 1);
        updateMatchData(p2, -c1, res === 0);
        db.ref('history').push({ p1: p1.name, p2: p2.name, change: c1 });
        document.getElementById('forecast').style.display = 'none';
    }

    function updateMatchData(p, change, isWin) {
        let streak = p.promoStreak || 0;
        let confirmed = p.isMidConfirmed || false;
        if (p.elo >= 1200 && !confirmed) {
            if (isWin) { streak++; if(streak >= 3) { confirmed = true; streak = 0; } }
            else { streak = 0; }
        }
        db.ref('players/' + p.name).update({ 
            tournamentPoints: (p.tournamentPoints || 0) + change,
            promoStreak: streak,
            isMidConfirmed: confirmed
        });
    }

    function finalizeTournament() {
        if(!confirm("Применить изменения?")) return;
        players.forEach(p => {
            const newElo = (p.elo || 1000) + (p.tournamentPoints || 0);
            let mStatus = p.isMidConfirmed || false;
            let hStatus = p.isHighConfirmed || false;

            if (mStatus && newElo < 1150) mStatus = false;
            if (hStatus && newElo < 1350) hStatus = false;
            if (newElo >= 1400) hStatus = true;

            db.ref('players/' + p.name).update({ elo: newElo, tournamentPoints: 0, isMidConfirmed: mStatus, isHighConfirmed: hStatus });
        });
    }

    function manualElo(n, c) {
        const v = prompt(`Установить ELO для ${n}:`, c);
        if (v !== null && !isNaN(v)) {
            const val = parseInt(v);
            db.ref('players/'+n).update({ 
                elo: val, 
                isMidConfirmed: val >= 1200, 
                isHighConfirmed: val >= 1400,
                promoStreak: 0
            });
        }
    }

    function clearHistory() { if(confirm("Удалить историю матчей?")) db.ref('history').remove(); }
    async function login() {
        const e = prompt("Email:"), p = prompt("Pass:");
        if(e && p) await auth.signInWithEmailAndPassword(e, p).catch(a => alert(a.message));
    }
    function logout() { auth.signOut(); }
    function addPlayer() {
        const n = document.getElementById('playerName').value.trim();
        if(n) db.ref('players/'+n).set({name:n, elo:1000, tournamentPoints:0, promoStreak:0, isMidConfirmed:false, isHighConfirmed:false});
    }
    function deletePlayer(n) { if(confirm("Удалить игрока?")) db.ref('players/'+n).remove(); }
</script>
</body>
</html>
