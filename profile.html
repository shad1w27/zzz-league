<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<title>Профиль Игрока - ZZZ</title>
	<link rel="stylesheet" href="css/profile.css" />
	<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>

<body>
	<div class="profile-card">
		<h1 id="profName">Загрузка...</h1>
		<div id="profTier">---</div>

		<div class="stat-grid">
			<div class="stat-item">
				<div class="stat-label">Всего игр</div>
				<div id="totalGames" class="stat-value">0</div>
			</div>
			<div class="stat-item">
				<div class="stat-label">Винрейт</div>
				<div id="winRate" class="stat-value winrate">0%</div>
			</div>
			<div class="stat-item">
				<div class="stat-label">Победы</div>
				<div id="wins" class="stat-value" style="color: #2eb82e;">0</div>
			</div>
			<div class="stat-item">
				<div class="stat-label">Поражения</div>
				<div id="losses" class="stat-value" style="color: #ff4444;">0</div>
			</div>
		</div>

		<a href="index.html" class="back-btn">← Вернуться к таблице</a>
	</div>
</body>

<script src="js/profile.js"></script>

</html>
